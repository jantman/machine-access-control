# This config expects the following hardware:
#
# - pcf8574 16x2 I2C character LCD connected with SDA on GPIO22 and SCL on GPIO23
# - wiegand RFID reader connected with d0 on GPIO16, d1 on GPIO4, and card present on GPIO18
# - oops button connected between GPIO32 and ground, no external resistors (internal pullup)
# - oops button LED connected directly to GPIO5
# - output relay on GPIO33
# - second output relay on GPIO14 (V1 connector pin 6); optional, driven from server's `second_relay` response field
# - neopixel (clockless / 1-wire) output on GPIO27
#
# And the following secrets in ESPHome's secrets.yaml:
#
# - ota_password - password for OTA updates
# - wifi_ssid
# - wifi_password
# - domain_name
# - mac_url - the full URL to the /api/machine/update endpoint of the machine-access-control server
#
# And the following substitutions:
#
# - machine_name - the machine name as configured in MAC and also the ESPHome device name; note these MUST match
#
substitutions:
  machine_name: "esp32test"

esphome:
  name: ${machine_name}
  friendly_name: ${machine_name}

esp32:
  board: esp32dev
  framework:
    type: esp-idf
    # Three layered hardware/runtime watchdogs:
    #
    # 1. Task WDT (CONFIG_ESP_TASK_WDT_*): catastrophic-hang fallback
    #    for the loop task. The 60 s timeout is intentionally generous
    #    so this does NOT interrupt an in-progress operation (e.g. a
    #    laser cut) when the application-level liveness watchdog
    #    (interval below) can recover; this only fires when the loop
    #    task itself is so wedged that no software watchdog can run.
    #
    # 2. Interrupt WDT (CONFIG_ESP_INT_WDT*): fires if interrupts are
    #    disabled (a critical section is held) for longer than the
    #    timeout. Catches loop blocks that would otherwise mask the
    #    task WDT, because the task WDT cannot itself fire from inside
    #    a critical section.
    #
    # 3. Bootloader/RTC WDT (CONFIG_BOOTLOADER_WDT_*): a hardware timer
    #    in the RTC domain that fires unconditionally. Last resort if
    #    the chip hangs in a way no software WDT can detect. Enabled
    #    here primarily to keep it on through application startup;
    #    runtime feeding is handled by the task WDT subsystem.
    sdkconfig_options:
      CONFIG_ESP_TASK_WDT_TIMEOUT_S: "60"
      CONFIG_ESP_TASK_WDT_EN: y
      CONFIG_ESP_TASK_WDT_INIT: y
      CONFIG_ESP_TASK_WDT_CHECK_IDLE_TASK_CPU0: y
      CONFIG_ESP_TASK_WDT_CHECK_IDLE_TASK_CPU1: y
      CONFIG_ESP_TASK_WDT_PANIC: y
      CONFIG_ESP_INT_WDT: y
      CONFIG_ESP_INT_WDT_TIMEOUT_MS: "300"
      CONFIG_BOOTLOADER_WDT_ENABLE: y
      CONFIG_BOOTLOADER_WDT_TIME_MS: "9000"

# Enable logging
logger:
  level: DEBUG

api:
  # don't reboot just because ESPHome isn't connected
  reboot_timeout: 0s
  encryption:
    key: !secret api_encryption_key

ota:
  password: !secret ota_password
  platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  domain: !secret domain_name
  reboot_timeout: "1min"
  on_connect:
    then:
      - script.execute: post_to_mac

globals:
  - id: display_content
    type: std::string
    restore_value: False
    max_restore_data_length: 34
    initial_value: '"Connecting to\nWiFi"'
  - id: rfid_tag
    type: std::string
    restore_value: False
    max_restore_data_length: 34
    initial_value: '""'
  # Uptime seconds at which the most recent POST to mac_url returned 200
  # (and was successfully parsed). Used by the liveness watchdog below.
  - id: last_ok_post_uptime
    type: uint32_t
    restore_value: False
    initial_value: '0'
  # Count of consecutive failed POSTs since the last success. Used to
  # surface persistent server-side problems on the LCD/log without
  # rebooting the device while a relay is energized.
  - id: consecutive_post_failures
    type: uint32_t
    restore_value: False
    initial_value: '0'

http_request:
  # Bound any single POST to a few seconds. `timeout` is the per-recv
  # socket timeout (best-effort upper bound); `watchdog_timeout` (esp-idf)
  # caps the WDT-feed window during transfer and gives a real ceiling
  # when paired with CONFIG_ESP_TASK_WDT_PANIC=y above.
  timeout: 5s
  watchdog_timeout: 8s

# Single source of truth for the POST to mac_url. mode: restart so a fresh
# trigger preempts a stuck one rather than queuing. Drives the relay,
# display, oops LED, status LED, and second relay from the JSON response.
# Tracks success/failure for the liveness watchdog interval below.
script:
  - id: post_to_mac
    mode: restart
    then:
      - http_request.post:
          url: !secret mac_url
          request_headers:
            Content-Type: application/json
          json: |-
            root["machine_name"] = App.get_name().c_str();
            root["oops"] = id(oops_button).state;
            root["rfid_value"] = id(rfid_tag);
            root["uptime"] = id(uptime_sensor).state;
            root["wifi_signal_db"] = id(wifi_signal_db).state;
            root["wifi_signal_percent"] = id(wifi_signal_percent).state;
            root["internal_temperature_c"] = id(internal_temperature_c).state;
            root["second_relay_state"] = id(relay2_output).state;
          capture_response: true
          on_response:
            then:
              - lambda: |-
                  if (response->status_code >= 200 && response->status_code < 300) {
                    bool parse_ok = json::parse_json(body, [](JsonObject root) -> bool {
                        if ( root["relay"]) {
                          ESP_LOGI("RELAY", "Turn relay on");
                          id(relay_output).turn_on();
                        } else {
                          ESP_LOGI("RELAY", "Turn relay off");
                          id(relay_output).turn_off();
                        }
                        std::string dcontent = root["display"];
                        id(display_content) = dcontent;
                        id(my_display).print(dcontent);
                        if ( root["oops_led"]) {
                          ESP_LOGI("OOPS", "Turn oops LED on");
                          id(oops_led).turn_on();
                        } else {
                          ESP_LOGI("OOPS", "Turn oops LED off");
                          id(oops_led).turn_off();
                        }
                        auto call = id(status_led).turn_on();
                        float brightness = root["status_led_brightness"];
                        call.set_brightness(brightness);
                        call.set_rgb(root["status_led_rgb"][0], root["status_led_rgb"][1], root["status_led_rgb"][2]);
                        call.perform();
                        bool sr_state = root["second_relay"] | false;
                        if ( sr_state) {
                          ESP_LOGI("RELAY2", "Turn second relay on");
                          id(relay2_output).turn_on();
                        } else {
                          ESP_LOGI("RELAY2", "Turn second relay off");
                          id(relay2_output).turn_off();
                        }
                        return true;
                    });
                    if (parse_ok) {
                      id(last_ok_post_uptime) = (uint32_t) id(uptime_sensor).state;
                      id(consecutive_post_failures) = 0;
                    } else {
                      id(consecutive_post_failures) += 1;
                      ESP_LOGW("HTTP",
                               "2xx but JSON parse failed; consec=%u",
                               id(consecutive_post_failures));
                    }
                  } else {
                    id(consecutive_post_failures) += 1;
                    ESP_LOGW("HTTP", "Non-2xx response %d; consec=%u",
                             response->status_code, id(consecutive_post_failures));
                  }
          on_error:
            then:
              - lambda: |-
                  id(consecutive_post_failures) += 1;
                  ESP_LOGW("HTTP", "POST failed (network/timeout); consec=%u",
                           id(consecutive_post_failures));

i2c:
  sda: GPIO22
  scl: GPIO23
  frequency: 400kHz

sensor:
  - platform: uptime
    name: Uptime
    id: uptime_sensor
    update_interval: 5s
  - platform: wifi_signal # Reports the WiFi signal strength/RSSI in dB
    name: "WiFi Signal dB"
    id: wifi_signal_db
    update_interval: 15s
    entity_category: "diagnostic"
  - platform: copy # Reports the WiFi signal strength in %
    source_id: wifi_signal_db
    name: "WiFi Signal Percent"
    id: wifi_signal_percent
    filters:
      - lambda: return min(max(2 * (x + 100.0), 0.0), 100.0);
    unit_of_measurement: "Signal %"
    entity_category: "diagnostic"
    device_class: ""
  - platform: internal_temperature
    name: "esp32_internal_temperature"
    id: internal_temperature_c

binary_sensor:
  - platform: gpio
    pin: GPIO18
    name: "Card Present"
    id: card_present
    on_release:
      then:
        - lambda: ESP_LOGI("TAG", "RFID tag removed");
        - lambda: |-
            id(rfid_tag) = "";
            id(display_content) = "Please insert\naccess card";
            id(my_display).print("Please insert\naccess card");
        - script.execute: post_to_mac

  - platform: gpio
    pin:
      number: GPIO32
      mode:
        input: True
        pullup: True
    name: "oops"
    id: oops_button
    filters:
      - delayed_on: 10ms
    on_press:
      then:
        - lambda: ESP_LOGI("OOPS", "Oops button pressed");
        - lambda: |-
            id(display_content) = "OOPS!";
            id(my_display).print("OOPS!");
        - script.execute: post_to_mac

button:
  - platform: restart
    name: "Reboot ESP"

output:
  - platform: gpio
    pin: GPIO33
    id: relay_output_pin
  - platform: gpio
    pin: GPIO14
    id: relay2_output_pin
  - platform: gpio
    pin: GPIO5
    id: oops_led

switch:
  - platform: output
    output: relay_output_pin
    id: relay_output
  - platform: output
    output: relay2_output_pin
    id: relay2_output

light:
  - platform: esp32_rmt_led_strip
    rgb_order: RGB
    pin: GPIO27
    num_leds: 1
    chipset: ws2812
    name: "StatusLED"
    id: status_led

wiegand:
  - id: keypad
    d0: GPIO16
    d1: GPIO4
    on_tag:
      - lambda: ESP_LOGI("TAG", "received tag %s", x.c_str());
      - lambda: |-
            id(rfid_tag) = x.c_str();
            id(display_content) = ((std::string) "TAG RX: " + x).c_str();
            id(my_display).print(((std::string) "TAG RX: " + x).c_str());
      - script.execute: post_to_mac

display:
  - platform: lcd_pcf8574
    dimensions: 16x2
    address: 0x27
    id: my_display
    lambda: |-
      it.print(id(display_content));

interval:
  # Heartbeat: post current state to mac_url every 10s.
  - interval: 10s
    startup_delay: 30s
    then:
      - script.execute: post_to_mac

  # Application-level liveness watchdog. Reboots the ESP if heartbeats
  # have stopped landing successfully — but only when no relay is
  # energized, so an in-progress operation (e.g. a laser cut) is not
  # interrupted. While the relay is on and the link is stale, surface
  # the condition on the LCD instead of rebooting; the next watchdog
  # tick after the relay drops will then reboot cleanly.
  #
  # 90 s threshold tolerates ~9 missed heartbeats and a typical
  # mac-server cold-start. 120 s startup_delay keeps this from firing
  # before the first successful POST has had a chance to land.
  #
  # The ESP-IDF task watchdog (CONFIG_ESP_TASK_WDT_PANIC=y above) is
  # the catastrophic-hang fallback if the loop task itself is wedged
  # so badly this interval never fires.
  - interval: 30s
    startup_delay: 120s
    then:
      - lambda: |-
          uint32_t now = (uint32_t) id(uptime_sensor).state;
          uint32_t last = id(last_ok_post_uptime);
          uint32_t stale = (last == 0) ? now : (now - last);
          bool relay_on = id(relay_output).state || id(relay2_output).state;
          if (stale > 90 && !relay_on) {
            ESP_LOGE("WDOG",
                     "No successful POST in %us; relay off; rebooting",
                     stale);
            // App.reboot() (not safe_reboot) — by the time this fires
            // the device is by-definition unrecoverable, so we want an
            // unconditional esp_restart(). safe_reboot() runs every
            // component's synchronous on_shutdown() hook and waits
            // indefinitely for it to return; http_request's shutdown
            // hook blocks when the network/server is unreachable —
            // exactly the condition we're trying to recover from.
            // See docs/2026-05-11-mcu-lockup-analysis.md.
            App.reboot();
          } else if (stale > 90 && relay_on) {
            ESP_LOGW("WDOG",
                     "No successful POST in %us; relay ON; deferring reboot",
                     stale);
            id(display_content) = "WARN: server\nlink stale";
            id(my_display).print(id(display_content));
          }
